{% extends "auctions/layout.html" %}

{% block title %}
    Categories
{% endblock %}

{% block body %}
    <h2>Categories</h2>
    <ul>
        {% for category in categories %}
            <li><a href="{% url 'category_listings' category_name=category %}">{{ category }}</a></li>
        {% empty %}
            <li>No categories available.</li>
        {% endfor %}
    </ul>
{% endblock %}
